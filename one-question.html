<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>One Question — All Take Out</title>
<meta name="description" content="One quick question — see live results the moment you answer.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='7' fill='%232E639E'/%3E%3Cpath d='M8 6h5a5 5 0 0 1 5 5v5a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Z' fill='%23F8FAFC'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/site.css">
<style>
	.ato-poll { max-width: 620px; margin: 0 auto var(--sp-8); padding: var(--sp-6); background: var(--white); border: 1px solid var(--color-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); }
	.ato-poll-question { margin: 0 0 var(--sp-5); font-size: var(--text-xl); }
	.ato-poll-options { display: grid; gap: var(--sp-3); }
	.ato-poll-option { min-height: 48px; padding: 0.7rem 1.25rem; border: 2px solid var(--color-border); border-radius: var(--radius-pill); background: var(--white); font: inherit; font-weight: 700; cursor: pointer; text-align: left; transition: border-color 180ms var(--ease-out), transform 180ms var(--ease-out); }
	.ato-poll-option:hover { border-color: var(--blue-700); transform: translateY(-1px); }
	.ato-poll-results { display: grid; gap: var(--sp-4); }
	.ato-poll-row-head { display: flex; justify-content: space-between; margin-bottom: 6px; gap: var(--sp-4); }
	.ato-poll-label { font-weight: 700; }
	.ato-poll-row.is-choice .ato-poll-label::after { content: " ✓ your answer"; color: var(--accent); font-size: var(--text-xs); }
	.ato-poll-pct { font-weight: 700; color: var(--blue-700); font-variant-numeric: tabular-nums; }
	.ato-poll-row.is-choice .ato-poll-pct { color: var(--accent); }
	.ato-poll-bar { height: 12px; border-radius: var(--radius-pill); background: var(--paper-2); overflow: hidden; }
	.ato-poll-bar i { display: block; height: 100%; width: 0; border-radius: var(--radius-pill); background: var(--blue-700); transition: width 900ms var(--ease-out); }
	.ato-poll-row.is-choice .ato-poll-bar i { background: var(--accent); }
	.ato-poll-total { margin: var(--sp-2) 0 0; font-size: var(--text-sm); color: var(--ink-soft); font-weight: 700; }
</style>
</head>
<body data-page="poll">
<div id="app-header"></div>

<main id="primary" class="site-main">
	<div class="page-hero">
		<div class="container">
			<span class="eyebrow">One Question</span>
			<h1>One question. 10 seconds.</h1>
			<p class="lede">Help us improve by answering one quick question. Your feedback shapes our future blogs and forum topics to better serve your interests.</p>
		</div>
	</div>

	<div class="container">
		<div class="ato-poll" id="the-poll"></div>
	</div>
</main>

<div id="app-footer"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/store.js"></script>
<script src="assets/js/main.js"></script>
<script>
(function () {
	var A = window.ATO;
	var root = document.getElementById('the-poll');

	function animateCount(el, target) {
		var start = null;
		var duration = 900;
		function step(ts) {
			if (!start) start = ts;
			var progress = Math.min((ts - start) / duration, 1);
			el.textContent = Math.round((1 - Math.pow(1 - progress, 3)) * target) + '%';
			if (progress < 1) window.requestAnimationFrame(step);
		}
		window.requestAnimationFrame(step);
		setTimeout(function () { el.textContent = target + '%'; }, duration + 150);
	}

	function render(animate) {
		var s = A.pollState();
		var pcts = A.pollPercentages(s.counts);

		if (!s.voted) {
			root.innerHTML = '<h3 class="ato-poll-question">' + A.esc(s.question) + '</h3>' +
				'<div class="ato-poll-options">' +
				s.options.map(function (opt, i) {
					return '<button type="button" class="ato-poll-option" data-choice="' + i + '">' + A.esc(opt) + '</button>';
				}).join('') + '</div>';
			root.querySelectorAll('.ato-poll-option').forEach(function (btn) {
				btn.addEventListener('click', function () {
					A.pollVote(parseInt(btn.getAttribute('data-choice'), 10));
					render(true);
				});
			});
			return;
		}

		root.innerHTML = '<h3 class="ato-poll-question">' + A.esc(s.question) + '</h3>' +
			'<div class="ato-poll-results" aria-live="polite">' +
			s.options.map(function (opt, i) {
				return '<div class="ato-poll-row' + (i === s.choice ? ' is-choice' : '') + '">' +
					'<div class="ato-poll-row-head"><span class="ato-poll-label">' + A.esc(opt) + '</span>' +
					'<span class="ato-poll-pct">0%</span></div>' +
					'<div class="ato-poll-bar"><i style="width:0%"></i></div></div>';
			}).join('') +
			'<p class="ato-poll-total">Based on ' + s.total + ' responses.</p></div>';

		var rows = root.querySelectorAll('.ato-poll-row');
		rows.forEach(function (row, i) {
			var bar = row.querySelector('.ato-poll-bar i');
			var pctEl = row.querySelector('.ato-poll-pct');
			setTimeout(function () {
				bar.style.width = pcts[i] + '%';
				if (animate) {
					animateCount(pctEl, pcts[i]);
				} else {
					pctEl.textContent = pcts[i] + '%';
				}
			}, 30);
		});
	}

	render(true);
})();
</script>
</body>
</html>
