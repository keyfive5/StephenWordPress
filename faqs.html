<script>
document.getElementById('faq-list').innerHTML = [
	["I don't have time to design a label or sticker. Can you do it for me?", "Absolutely. Simply send us a message with your requirements and we'll create a label or sticker for you free of charge.<br><br>Whether you need a Branded Label, QR Code Label, Promotional Sticker, Tamper-Evident Seal, or a completely custom design, we'll work with you to create a design that matches your restaurant, message, and goals.<br><br>Every order you place with us is saved for quick retrieval - making reordering a simple click."],
	["What if I make a mistake while designing my label?", "Don't worry. Before we rush your order to print, every design is reviewed by real eyes, not an algorithm.<br><br>Our design team carefully inspects your artwork for common issues such as sizing problems, misplaced elements, low-resolution images, spelling mistakes, or formatting concerns. If we spot something that may affect the appearance of your labels, we'll correct it whenever possible or contact you if needed.<br><br>Most online printers rely heavily on automated systems. We believe a human review helps ensure your labels look their best before production begins."],
	["What is the VIP Membership Program?", "Our VIP Membership is completely free and easy to join. VIP Members receive:<br>• Free shipping on every order, regardless of order size<br>• Exclusive deals &amp; offers available only to VIP Members<br>• An additional 50 labels added to every order<br><br>It's our way of helping restaurants get a little more value from every purchase."],
	["Why do you offer Bundles?", "Our Bundles help restaurants get more value from every order. Instead of purchasing individual labels and stickers separately, restaurants can combine complementary products into one affordable package designed to promote branding, repeat business, online reviews, and customer engagement.<br><br>Unlike traditional in-store and online printers, our Bundles are built specifically with restaurant growth in mind. It's a unique offering that most printers simply don't provide."],
	["Why choose you instead of a local print shop or online printer?", "Most printers simply print what you send them. We focus exclusively on helping restaurants build their brand, encourage repeat business, increase online reviews, and improve customer engagement through strategic label and sticker solutions.<br><br>Our prices are very competitive, and our VIP Membership Program provides even more value through free shipping, bonus labels, and exclusive offers."],
	["How quickly will my labels ship?", "From the time we receive your order, review or create your artwork, print your labels, and prepare them for shipment, the entire process typically takes 4 to 7 business days.<br><br>We'll be quick to ship without shortcuts – quality's always first."],
	["Do I need professional artwork for Branded Labels?", "Not at all. You can upload your own logo/artwork or simply create a label with our easy-to-use design tool – add text, color, restaurant themed clip art or QR Codes. No design experience required."],
	["I'm not good with technology. Can you help?", "Absolutely. We've designed our customization tools to be as simple as possible, but if you run into any issues, we're here to help.<br><br>Real eyes will be on your work – not an algorithm focused on speed. Our team of designers check and make any needed corrections before we go to print.<br><br>If you need extra assistance, simply email us and we'll guide you through the process—or even help set up your design at no additional charge. Once your design is created, reordering is fast and effortless."],
	["How do I design a label?", "Simply click Design Now to get started. You can upload artwork, add text, choose colors, generate QR Codes, and use our restaurant-themed clipart. We've made the process quick, simple, and fun.<br><br>For additional help, be sure to check out our Directions for Making a Perfect Label."],
	["Can I add a QR Code to my labels?", "Absolutely. Our built-in QR Code Generator allows you to create QR Codes that can link to your menu, online ordering page, Google Reviews, social media accounts, promotions, loyalty programs, and more."],
	["Do QR Codes really help restaurants?", "Yes. QR Codes can help customers quickly access your menu, online ordering page, Google Reviews, loyalty programs, social media accounts, and special promotions.<br><br>A QR Code will direct your customers to wherever you want them to go."],
	["Why use Branded Labels instead of plain packaging?", "Branded Labels help turn ordinary packaging into a marketing tool. They increase brand recognition, promote repeat business, encourage online reviews, and help your restaurant stand out from competitors."],
	["Which labels are most popular with restaurants?", "Our most popular products are Branded Labels, QR Code Labels, Promotional Labels, Tamper-Evident Labels, Social Media Labels, and Customer Appreciation Stickers.<br><br>Many restaurants bundle several label types together for maximum value and marketing impact."],
	["Can I use my labels on takeout bags, containers, and drink cups?", "Yes. Our labels are designed for a wide variety of restaurant packaging, including takeout bags, food containers, beverage cups, boxes, and packaging sleeves."],
	["Do I need Tamper Evident Labels, or can regular labels seal packaging too?", "Many of our labels and stickers can be used to help seal takeout bags, boxes, cups, and packaging. However, not every label is considered tamper evident.<br><br>True tamper-evident performance depends on the label material, adhesive strength, surface type, and how the label is applied.<br><br>Our Tamper Evident Labels are designed and positioned specifically for sealing orders in a way customers can recognize. They help show that the order was closed with care before pickup or delivery.<br><br>For many restaurants, the value is customer comfort. A sealed package feels more intentional, more professional, and more trustworthy."],
	["What if I'm not satisfied with my order?", "Not Satisfied? Your trust and satisfaction is so very important to us but it's inevitable that on a few occasions we'll miss the mark. If this happens contact us and we'll do our best to make it right. If we're unable to resolve the problem, we'll gladly refund your purchase."],
	["Do you offer free shipping?", "Yes. We offer free ground shipping on orders over $80. VIP Members receive free shipping on all orders, regardless of order size."],
	["Do you ship throughout Canada and the United States?", "Yes. We ship anywhere in Canada and the United States."],
	["What's the minimum order quantity?", "Our roll labels can be ordered in quantities as low as 100 labels and up to 2,000 labels per order."],
	["Can I reorder the same labels later?", "Absolutely. Once your design has been created and approved, reordering is quick and easy. No need to recreate your artwork every time."],
	["What label sizes do you offer?", "We offer a variety of popular label sizes suitable for takeout bags, food containers, beverage cups, packaging, promotional campaigns, and more."],
	["Are your labels water-resistant?", "Yes. Our water-resistant labels are designed to maintain their adhesiveness with inks and colors that won't smudge. Remember, we cater to restaurants so our labels and stickers will standup to moisture, refrigeration and anything that the restaurant environment brings."],
	["What is BOPP, and when should I choose it instead of paper?", "BOPP stands for biaxially oriented polypropylene. In simple terms, it is a durable plastic-based label material often used for packaging labels that need extra strength.<br><br>BOPP (being water-resistant) is a good choice when your labels may come into contact with moisture, condensation, oils, handling, or refrigeration. It is commonly used for takeout containers, drink cups, food packaging, delivery bags, and labels that need to stay looking clean and professional during busy restaurant service.<br><br>Glossy paper labels are sometimes the better option when you want a more economical label for dry packaging, paper bags, boxes, customer appreciation stickers, promotional labels, or short-term use. Paper can still look professional and polished, but it is usually best for packaging that will stay dry.<br><br>A simple way to choose: use BOPP when you want extra durability and water resistance. Use Glossy Paper when you want a clean, professional label at a lower cost for dry packaging."],
	["What file types can I upload?", "We accept most common file formats, including: PNG, JPG, AI, GIF, SVG, BMP, PDF, TIFF, and PSD.<br><br>For the best print quality, we recommend artwork at 300 DPI whenever possible."],
	["What happens to RGB artwork?", "Most digital files are created in RGB color mode, while commercial printing uses CMYK inks. If your file is uploaded in RGB, we'll convert it to CMYK for printing. Because of this conversion, some colors may appear slightly different in print than they do on your screen."]
].map(function (f) {
	return '<details class="faq-item"><summary>' + f[0] + '</summary><div class="faq-a"><p>' + f[1] + '</p></div></details>';
}).join('');
</script>
