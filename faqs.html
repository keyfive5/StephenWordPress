<script src="assets/js/data.js"></script>

<script>
document.getElementById('faq-list').innerHTML = [
	['How long does printing and delivery take?', 'Most orders are printed within 2–3 business days after design approval, then shipped via ground. VIP members always ship free.'],
	['Do I need design experience to use the editor?', 'Not at all. Pick a template, drop in your logo and text, and our print team gives every design a professional once-over before it prints.'],
	['What materials can I choose from?', 'Each product lists its available materials — from glossy paper to waterproof vinyl and freezer-safe stock for food identification labels.'],
	['Can you check my design before printing?', 'Yes — every single order is reviewed by a human. We fix alignment issues and flag anything that looks off before it goes to press.'],
	['How do the 50 free VIP stickers work?', 'Create an account (even during checkout) and 50 complimentary stickers are credited to you automatically, shipped with your next order.'],
	['What if my labels arrive damaged?', 'Contact us with a photo and your order number — we reprint and reship at no cost. VIP tickets are prioritized.']
].map(function (f) {
	return '<details class="faq-item"><summary>' + f[0] + '</summary><div class="faq-a"><p>' + f[1] + '</p></div></details>';
}).join('');
</script>
